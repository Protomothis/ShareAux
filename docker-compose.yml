services:
  db:
    image: postgres:16
    container_name: shareaux-db
    environment:
      POSTGRES_DB: spotiparty
      POSTGRES_USER: spotiparty
      POSTGRES_PASSWORD: ${DB_PASSWORD:-spotiparty123}
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U spotiparty']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - spoti-network

  server:
    build: ./server
    container_name: shareaux-server
    environment:
      DATABASE_URL: postgres://spotiparty:${DB_PASSWORD:-spotiparty123}@db:5432/spotiparty
      CLIENT_URL: http://localhost:3001
    env_file: ./.env
    ports:
      - '3000:3000'
    depends_on:
      db:
        condition: service_healthy
    networks:
      - spoti-network

  client:
    build:
      context: ./client
    container_name: shareaux-client
    environment:
      INTERNAL_API_URL: http://server:3000/api
    ports:
      - '3001:3001'
    depends_on:
      - server
    networks:
      - spoti-network

volumes:
  pgdata:

networks:
  spoti-network:
